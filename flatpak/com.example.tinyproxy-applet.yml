app-id: com.example.tinyproxy-applet
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: tinyproxy-applet
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/tinyproxy-applet/cargo
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.Flatpak
modules:
  - name: tinyproxy-applet
    buildsystem: simple
    build-commands:
      - cargo build --release --offline
      - install -Dm755 target/release/tinyproxy-applet /app/bin/tinyproxy-applet
      - install -Dm644 flatpak/com.example.tinyproxy-applet.desktop /app/share/applications/com.example.tinyproxy-applet.desktop
      - install -Dm644 flatpak/com.example.tinyproxy-applet.metainfo.xml /app/share/metainfo/com.example.tinyproxy-applet.metainfo.xml
      - install -Dm644 flatpak/com.example.tinyproxy-applet.svg /app/share/icons/hicolor/scalable/apps/com.example.tinyproxy-applet.svg
    sources:
      - type: dir
        path: ..
      - type: file
        path: cargo-sources.json
